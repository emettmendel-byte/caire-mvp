<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clinical guideline parser</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="glass-panel header">
            <div class="logo">
                <span class="logo-icon">✨</span>
                <h1>Caire Medical Guideline Parser</h1>
            </div>
            <div class="status-indicator">
                <span class="dot offline" id="system-status-dot"></span>
                <span id="system-status-text">System Ready</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-grid">
            
            <!-- Left Panel: Pipeline Controls -->
            <section class="left-panel">
                <div class="glass-panel card upload-card">
                    <h2>Upload Guideline PDF</h2>
                    <p class="subtitle">Extract clinical rules and build an execution tree.</p>
                    
                    <div class="upload-area" id="drop-zone">
                        <input type="file" id="pdf-upload" accept="application/pdf" class="hidden-input">
                        <label for="pdf-upload" class="upload-label">
                            <span class="upload-icon">📄</span>
                            <span class="upload-text">Click to browse or drop PDF here</span>
                        </label>
                    </div>

                    <button id="run-pipeline-btn" class="btn primary-btn" disabled>
                        <span>Run Pipeline</span>
                        <div class="loader hidden"></div>
                    </button>
                </div>

                <div class="glass-panel card status-card">
                    <h2>Pipeline Status</h2>
                    <div class="status-tracker" id="status-tracker">
                        <!-- Step items generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Right Panel: Agents / Prompts -->
            <section class="right-panel">
                <div class="glass-panel card prompts-card">
                    <div class="prompts-header">
                        <h2>Agent Configuration</h2>
                        <button id="save-prompts-btn" class="btn secondary-btn">Save Changes</button>
                    </div>
                    <div class="prompt-tabs" id="prompt-tabs">
                        <!-- Tabs generated by JS -->
                    </div>
                    <div class="prompt-content" id="prompt-content">
                        <!-- Textareas generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Bottom Panel: Outputs -->
            <section class="bottom-panel">
                <div class="glass-panel card artifacts-card">
                    <h2>Generated Artifacts</h2>
                    <div class="artifacts-grid" id="artifacts-grid">
                        <div class="empty-state">No artifacts generated yet. Run the pipeline to see results.</div>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <!-- Modal for viewing JSON -->
    <div id="json-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <div class="modal-header">
                <h3 id="modal-title">Artifact Output</h3>
                <button class="close-btn" id="close-modal">&times;</button>
            </div>
            <pre><code id="json-output"></code></pre>
        </div>
    </div>

    <script src="static/app.js"></script>
</body>
</html>
